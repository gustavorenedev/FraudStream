apiVersion: 1

datasources:
  - name: FraudStream PostgreSQL
    type: postgres
    url: postgres:5432
    user: fraud_user
    secureJsonData:
      password: fraud_pass
    jsonData:
      database: fraudstream
      sslmode: disable
      maxOpenConns: 10
      maxIdleConns: 5
      connMaxLifetime: 14400
      postgresVersion: 1600
      timescaledb: false
    isDefault: true
    editable: false